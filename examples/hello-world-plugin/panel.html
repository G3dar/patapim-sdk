<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Hello Panel</title>
<style>
  body { font-family: system-ui, sans-serif; background:#151516; color:#e8e6e3; margin:0; padding:18px; }
  h2 { margin:0 0 4px; font-size:16px; }
  .sub { color:#a09b94; font-size:12px; margin-bottom:14px; }
  button { background:#49F0F8; color:#0a1214; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  button.secondary { background:none; color:#a09b94; border:1px solid #444; }
  .row { display:flex; gap:8px; margin-bottom:12px; }
  pre { background:#1d1d1f; border-radius:8px; padding:10px; font-size:12px; white-space:pre-wrap; min-height:60px; }
</style>
</head>
<body>
  <h2>hello-world panel</h2>
  <div class="sub" id="info">loading…</div>
  <div class="row">
    <button id="count">Count terminals</button>
    <button id="notify" class="secondary">Send notification</button>
    <button id="close" class="secondary">Close</button>
  </div>
  <pre id="out">Click a button.</pre>
  <script src="panel.js"></script>
</body>
</html>
